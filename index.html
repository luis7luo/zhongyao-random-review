<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中药功效随机复习</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18221f;
      --muted: #66746f;
      --line: #d9e2de;
      --paper: #fbfaf5;
      --panel: #ffffff;
      --accent: #23715e;
      --accent-2: #a7462c;
      --soft: #edf5ef;
      --warn: #fff1e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    header, footer {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 18px 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0;
    }
    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }
    .stage {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 8px 18px 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 16px;
      align-items: start;
    }
    .quiz, .side, .list {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(31, 46, 39, 0.08);
    }
    .quiz {
      min-height: 430px;
      padding: clamp(20px, 4vw, 36px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
    }
    .label {
      color: var(--muted);
      font-size: 14px;
    }
    .herb {
      margin: 12px 0 8px;
      font-size: clamp(46px, 10vw, 92px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .herb.effect-prompt {
      font-size: clamp(24px, 6vw, 42px);
      line-height: 1.35;
    }
    .category {
      display: inline-flex;
      max-width: 100%;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: #315b50;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .answer {
      min-height: 108px;
      border-top: 1px solid var(--line);
      padding-top: 22px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.45;
      font-weight: 700;
    }
    .answer.hidden {
      color: var(--muted);
      font-size: 18px;
      font-weight: 500;
    }
    .answer .effect {
      display: block;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.45;
      font-weight: 800;
    }
    .answer .mnemonic {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      font-weight: 500;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button, input, select {
      font: inherit;
    }
    button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 650;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button.warn {
      background: var(--warn);
      border-color: #f4cfbd;
      color: var(--accent-2);
    }
    button:active { transform: translateY(1px); }
    .side {
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .statgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fcfffd;
    }
    .num {
      display: block;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }
    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 11px;
      background: #fff;
      color: var(--ink);
    }
    .list {
      grid-column: 1 / -1;
      padding: 14px;
      max-height: 310px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      padding: 10px 8px;
      line-height: 1.45;
    }
    th { color: var(--muted); font-weight: 650; }
    footer {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      padding-top: 0;
    }
    @media (max-width: 820px) {
      .stage { grid-template-columns: 1fr; }
      .quiz { min-height: 390px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>给女朋友的中药功效随机复习</h1>
      <p class="sub">随机说一味药，先在心里背书上功效，再点开答案。不会的会进“再来一遍”，下一轮优先抽。</p>
    </header>
    <section class="stage">
      <article class="quiz">
        <div>
          <div class="label" id="questionLabel">这味药是</div>
          <div class="herb" id="herbName">麻黄</div>
          <div class="category" id="category">发散风寒</div>
        </div>
        <div>
          <div class="answer hidden" id="answer">先别偷看。想好功效后再点“看答案”。</div>
        </div>
        <div class="buttons">
          <button class="primary" id="showBtn">看答案</button>
          <button id="knowBtn">会了</button>
          <button class="warn" id="missBtn">再来一遍</button>
          <button id="nextBtn">随机下一味</button>
        </div>
      </article>
      <aside class="side">
        <div class="statgrid">
          <div class="stat"><span class="num" id="totalCount">0</span><span class="small">题库</span></div>
          <div class="stat"><span class="num" id="missCount">0</span><span class="small">待加强</span></div>
          <div class="stat"><span class="num" id="doneCount">0</span><span class="small">已答</span></div>
          <div class="stat"><span class="num" id="rate">0%</span><span class="small">会了率</span></div>
        </div>
        <label class="field">
          <span class="small">抽题范围</span>
          <select id="mode">
            <option value="all">全部随机</option>
            <option value="miss">只抽待加强</option>
          </select>
        </label>
        <label class="field">
          <span class="small">复习方向</span>
          <select id="direction">
            <option value="name">看药名，背功效</option>
            <option value="effect">看功效，想药名</option>
          </select>
        </label>
        <label class="field">
          <span class="small">分类</span>
          <select id="categoryFilter">
            <option value="all">全部分类</option>
          </select>
        </label>
        <label class="field">
          <span class="small">搜索药名或功效</span>
          <input id="search" placeholder="例如：当归、清热、止血">
        </label>
        <button id="resetBtn">清空记录</button>
        <div class="small">题库由扫描版 PDF OCR 自动整理并校正，共 374 条。答案采用讲义详细表里的正式功效列，同时保留原讲义口诀作辅助记忆。</div>
      </aside>
      <section class="list">
        <table>
          <thead><tr><th>药名</th><th>正式功效</th><th>口诀</th><th>分类</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </section>
    <footer>小建议：先按分类过一轮正式功效，再用“看功效，想药名”反向检查；最后切到“只抽待加强”，集中补漏。</footer>
  </main>

      $("answer").textContent = hiddenText();
      $("answer").classList.add("hidden");
      update();
    };
    const reveal = () => {
      if (!current) return;
      revealed = true;
      $("answer").innerHTML = answerHtml();
      $("answer").classList.remove("hidden");
    };
    const mark = (known) => {
      if (!current) return;
      state.done += 1;
      if (known) {
        state.know += 1;
        state.miss = state.miss.filter(name => name !== current.name);
      } else if (!state.miss.includes(current.name)) {
        state.miss.push(current.name);
      }
      save();
      pick();
    };
    const update = () => {
      $("totalCount").textContent = herbs.length;
      $("missCount").textContent = state.miss.length;
      $("doneCount").textContent = state.done;
      $("rate").textContent = state.done ? Math.round(state.know / state.done * 100) + "%" : "0%";
    };
    const renderRows = () => {
      const q = $("search").value.trim();
      const selectedCategory = $("categoryFilter").value;
      const rows = herbs.filter(h => {
        if (selectedCategory !== "all" && h.category !== selectedCategory) return false;
        return !q || h.name.includes(q) || h.answer.includes(q) || (h.mnemonic || "").includes(q) || (h.category || "").includes(q);
      }).slice(0, 160);
      $("rows").innerHTML = rows.map(h => `<tr><td><strong>${escapeHtml(h.name)}</strong></td><td>${escapeHtml(h.answer)}</td><td>${escapeHtml(h.mnemonic || "")}</td><td>${escapeHtml(h.category || "")}</td></tr>`).join("");
    };

    $("showBtn").addEventListener("click", reveal);
    $("knowBtn").addEventListener("click", () => mark(true));
    $("missBtn").addEventListener("click", () => mark(false));
    $("nextBtn").addEventListener("click", pick);
    $("mode").addEventListener("change", pick);
    $("direction").addEventListener("change", pick);
    $("categoryFilter").addEventListener("change", () => { renderRows(); pick(); });
    $("search").addEventListener("input", renderRows);
    $("resetBtn").addEventListener("click", () => {
      state.miss = [];
      state.done = 0;
      state.know = 0;
      save();
      update();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === " ") { event.preventDefault(); revealed ? pick() : reveal(); }
      if (event.key === "1") mark(true);
      if (event.key === "2") mark(false);
    });
    renderRows();
    pick();
  </script>
</body>
</html>
